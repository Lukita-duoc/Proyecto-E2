server:
  port: 0
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bd_empleados
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

springdoc:
  swagger-ui:
    config-url: /empleados-service/v3/api-docs/swagger-config
    url: /empleados-service/v3/api-docs
    disable-swagger-default-url: true
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  openapi:
    servers:
      - url: /empleados-service
        description: API Gateway - Empleados y Sucursales
