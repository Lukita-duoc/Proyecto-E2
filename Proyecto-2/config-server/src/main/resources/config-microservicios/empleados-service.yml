# Configuración del Servidor
server:
  port: 0
  forward-headers-strategy: framework

# Configuración de Spring (BD, JPA, Hibernate y Flyway)
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bd_empleados
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true

# Configuración de Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

# Configuración de Swagger / OpenApi (Springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    config-url: /empleados-service/v3/api-docs/swagger-config
    url: /empleados-service/v3/api-docs
    disable-swagger-default-url: true
    path: /swagger-ui.html
  openapi:
    servers:
      - url: /empleados-service
        description: API Gateway - Empleados y Sucursales