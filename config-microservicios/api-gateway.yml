server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: clientes
        url: /v3/api-docs/clientes
      - name: producto
        url: /v3/api-docs/productos
      - name: envios
        url: /v3/api-docs/envios
      - name: empleados
        url: /v3/api-docs/empleados


spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: clientes
              uri: lb://clientes-service
              predicates:
                - Path=/api/v1/clientes/**, /v3/api-docs/clientes
              filters:
                - RewritePath=/v3/api-docs/clientes, /v3/api-docs

            - id: empresas
              uri: lb://clientes-service
              predicates:
                - Path=/api/v1/empresas/**

            - id: marcas
              uri: lb://productos-service
              predicates:
                - Path=/api/v1/marcas/**

            - id: productos
              uri: lb://productos-service
              predicates:
                - Path=/api/v1/productos/**, /v3/api-docs/productos
              filters:
                - RewritePath=/v3/api-docs/productos, /v3/api-docs


            - id: sucursales
              uri: lb://empleados-service
              predicates:
                - Path=/api/v1/sucursales/**

            - id: empleados
              uri: lb://empleados-service
              predicates:
                - Path=/api/v1/empleados/**, /v3/api-docs/empleados
              filters:
                - RewritePath=/v3/api-docs/empleados, /v3/api-docs

            - id: inventarios
              uri: lb://inventario-service
              predicates:
                - Path=/api/v1/inventario/**

            - id: proveedores
              uri: lb://proveedores-service
              predicates:
                - Path=/api/v1/proveedores/**

            - id: contacto_proveedores
              uri: lb://proveedores-service
              predicates:
                - Path=/api/v1/contactoproveedores/**

            - id: orden_compra
              uri: lb://ordenes-service
              predicates:
                - Path=/api/v1/ordenes/**

            - id: detalle_orden
              uri: lb://ordenes-service
              predicates:
                - Path=/api/v1/detalles/**

            - id: facturas
              uri: lb://facturacion-service
              predicates:
                - Path=/api/v1/facturas/**

            - id: envios
              uri: lb://envios-service
              predicates:
                - Path=/api/v1/envios/**, /v3/api-docs/envios
              filters:
                - RewritePath=/v3/api-docs/envios, /v3/api-docs
